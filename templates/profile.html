{% extends "base.html" %}

{% block css %}
<link rel="stylesheet" href="/static/profilestyle.css">
{% endblock %}

{% block title %}Your Profile{% endblock %}

{% block content %}

<div class="profile-container">

  <h2>My Profile</h2>


  <div class="profile-info">
    <p><strong>Username:</strong> {{ name }}</p>
    <p><strong>Email:</strong> {{ email }}</p>
  </div>


  <form action="/profile/update_name" method="POST" class="form-box">
    <label for="name">Change Username</label>
    <input type="text" id="name" name="name" placeholder="Enter new username" required>
    <button type="submit">Update Name</button>
  </form>


  <form action="/profile/update_email" method="POST" class="form-box">
    <label for="email">Change Email</label>
    <input type="email" id= "email" name="email" placeholder="Enter new email" required>
    <button type="submit">Update Email</button>
  </form>

 
  <form action="/profile/delete_account" method="POST" class="delete-form">
    <button type="submit" onclick="return confirm('Are you sure you want to delete your account?')">
      Delete Account
    </button>
  </form>

</div>

{% endblock %}
